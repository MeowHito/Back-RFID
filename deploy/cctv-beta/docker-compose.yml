version: '3.8'

# Place at /opt/cctv-beta/docker-compose.yml on the EC2 ingest host.
# Required sibling files: .env, mediamtx.yml, hooks/*.sh
services:
  mediamtx:
    # Build from local Dockerfile — adds curl + openssl on top of the
    # mediamtx:1.9.0-ffmpeg (alpine) image so /hooks/*.sh can sign + POST
    # webhooks. The plain bluenviron/mediamtx:1.9.0 image is scratch-based
    # and can't even run /bin/sh, hooks die with "no such file or directory".
    build:
      context: .
      dockerfile: Dockerfile
    image: cctv-beta-mediamtx:local
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - /var/cctv/hls:/recordings
      - ./hooks:/hooks:ro
    env_file: .env
    environment:
      - MTX_INGEST_SECRET=${CCTV_BETA_INGEST_SECRET}
      - BACKEND_URL=${BACKEND_URL}

  s3-sync:
    image: amazon/aws-cli:latest
    restart: unless-stopped
    volumes:
      - /var/cctv/hls:/data:ro
    # env_file alone — do NOT add an `environment:` block that re-declares AWS_*
    # keys with ${VAR} interpolation. If .env omits them (because the EC2 host
    # uses an IAM instance role / IMDS), the interpolation produces an empty
    # string which OVERRIDES the IMDS credentials chain inside the container,
    # and `aws s3 sync` will fail with "Unable to locate credentials".
    env_file: .env
    entrypoint: /bin/sh
    command:
      - -c
      # Sync every 15s so admin S3 playback sees fresh segments quickly.
      # --acl public-read = HLS browser player needs to fetch .m3u8 + .ts directly.
      # Without ACL, S3 objects are private and the player gets AccessDenied (XML error).
      # Switch to bucket policy + signed URLs for stricter access control later.
      - "while true; do aws s3 sync /data s3://$$S3_BUCKET/hls --exclude '*.tmp' --storage-class STANDARD_IA --acl public-read; sleep 15; done"

  # Reclaim EC2 disk space after segments are safely on S3.
  # Runs every 5 minutes; deletes any file in /var/cctv/hls whose mtime is older
  # than 10 minutes. Live segments are still being written (mtime keeps updating)
  # so they won't be touched. fmp4 recordings rotate every 1h (recordSegmentDuration)
  # so a finalised .mp4 stops getting writes and becomes eligible after 10min — by
  # which point s3-sync has pushed it (it runs every 15s).
  # Tweak BETA_CLEANUP_AGE_MIN in .env if you want a longer safety window.
  cleanup:
    image: alpine:3.20
    restart: unless-stopped
    volumes:
      - /var/cctv/hls:/data
    env_file: .env
    environment:
      - AGE_MIN=${BETA_CLEANUP_AGE_MIN:-10}
      - INTERVAL_SEC=${BETA_CLEANUP_INTERVAL_SEC:-300}
    entrypoint: /bin/sh
    command:
      - -c
      - "while true; do echo \"[cleanup] purging files older than $$AGE_MIN min\"; find /data -type f -mmin +$$AGE_MIN -print -delete 2>/dev/null | wc -l | xargs -I{} echo \"[cleanup] deleted {} files\"; find /data -type d -empty -not -path /data -delete 2>/dev/null; sleep $$INTERVAL_SEC; done"
